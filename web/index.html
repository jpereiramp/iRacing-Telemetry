<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iRacing Telemetry Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060816;
      --panel: #10162f;
      --panel-soft: #131b3a;
      --fg: #e8ecff;
      --muted: #96a0cc;
      --accent: #4cd4ff;
      --accent-2: #6d6aff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background: radial-gradient(circle at top, #11153a 0%, var(--bg) 60%);
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      color: var(--fg);
      padding: 20px;
    }
    .shell {
      width: min(980px, 96vw);
      display: grid;
      gap: 12px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 2px 8px;
    }
    .title { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.3px; }
    .state {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
    }
    .state.live { color: #83f79f; border-color: rgba(131,247,159,0.4); }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }
    .card {
      border-radius: 18px;
      background: linear-gradient(160deg, #141b3a 0%, var(--panel) 100%);
      box-shadow: 0 14px 60px rgba(4, 6, 20, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      padding: 18px;
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .speed-card { grid-column: span 8; }
    .rpm-card { grid-column: span 4; }
    .gear-card, .pedal-card, .trend-card { grid-column: span 4; }
    #gauge { width: 100%; height: 220px; display: block; }
    .metric {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 2px 12px 0;
    }
    .speed { font-size: 2.2rem; font-weight: 700; }
    .rpm { font-size: 2rem; font-weight: 700; }
    .gear { font-size: 2.6rem; font-weight: 700; line-height: 1; }
    .unit { font-size: 0.95rem; color: var(--muted); margin-left: 6px; }
    .subtle { color: var(--muted); font-size: 0.85rem; }
    #trend { width: 100%; height: 105px; display: block; opacity: 0.9; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .pedal {
      margin: 10px 0 0;
    }
    .pedal-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 90ms linear;
    }
    .rpm-ring {
      margin-top: 4px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .rpm-ring > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4cd4ff 0%, #6d6aff 55%, #ff5d8f 100%);
      transition: width 90ms linear;
    }
    @media (max-width: 860px) {
      .speed-card, .rpm-card, .gear-card, .pedal-card, .trend-card { grid-column: span 12; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="title">iRacing Telemetry Dashboard</div>
      <div id="sourceState" class="state">connecting...</div>
    </div>
    <section class="grid">
      <article class="card speed-card">
        <h3>Speed</h3>
        <canvas id="gauge" width="620" height="220"></canvas>
        <div class="metric">
          <div>
            <span id="speedValue" class="speed">--</span>
            <span class="unit">mph</span>
          </div>
          <div id="speedKph" class="subtle">-- km/h</div>
        </div>
      </article>
      <article class="card rpm-card">
        <h3>Engine</h3>
        <div class="row">
          <div><span id="rpmValue" class="rpm">--</span> <span class="unit">rpm</span></div>
        </div>
        <div class="rpm-ring"><span id="rpmBar"></span></div>
      </article>
      <article class="card gear-card">
        <h3>Gear</h3>
        <div id="gearValue" class="gear">N</div>
      </article>
      <article class="card pedal-card">
        <h3>Pedals</h3>
        <div class="pedal">
          <div class="pedal-label"><span>Throttle</span><span id="throttlePct">0%</span></div>
          <div class="bar"><span id="throttleBar"></span></div>
        </div>
        <div class="pedal">
          <div class="pedal-label"><span>Brake</span><span id="brakePct">0%</span></div>
          <div class="bar"><span id="brakeBar"></span></div>
        </div>
        <div class="pedal">
          <div class="pedal-label"><span>Clutch</span><span id="clutchPct">0%</span></div>
          <div class="bar"><span id="clutchBar"></span></div>
        </div>
      </article>
      <article class="card trend-card">
        <h3>Speed Trend</h3>
        <canvas id="trend" width="300" height="105"></canvas>
      </article>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
